services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pixel_breeders_auth
      POSTGRES_USER: pixel
      POSTGRES_PASSWORD: pixel
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixel -d pixel_breeders_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://pixel:pixel@db:5432/pixel_breeders_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-pixel-breeders-dev-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:8080"

volumes:
  pgdata_auth:
