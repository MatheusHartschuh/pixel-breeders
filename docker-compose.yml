services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pixel_breeders
      POSTGRES_USER: pixel
      POSTGRES_PASSWORD: pixel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixel -d pixel_breeders"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://pixel:pixel@db:5432/pixel_breeders
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
